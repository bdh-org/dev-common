name: CI

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.13"
      requirements-file:
        type: string
        default: "requirements-prod.txt"
      test-path:
        type: string
        default: "tests/"
      run-tests:
        type: boolean
        default: true
      run-lint:
        type: boolean
        default: true
      install-requirements:
        type: boolean
        default: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Clone dev-common submodule
        run: git submodule update --init common

      - name: Version consistency
        run: make version-check

      # Registry-image deploys deliver DAGs ONLY when the image bakes them: the
      # merge-to-main pipeline ships the image, and Airflow tasks docker-run into
      # it — a dags/ dir the Dockerfile never COPYs means merged DAG changes
      # silently never land (bdh-org/home-infra#15; bit panoptikon/hog/freddyb).
      - name: DAG delivery guardrail
        run: |
          if [ -d dags ] && [ -f Dockerfile ] && ! grep -Eq '^[[:space:]]*COPY[[:space:]]+.*dags' Dockerfile; then
            echo "::error::dags/ exists but the Dockerfile never COPYs it — DAG changes will not be delivered by the registry image. Add 'COPY dags/ /app/dags/' (bdh-org/home-infra#15)."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install project requirements
        if: inputs.install-requirements
        run: pip install -r ${{ inputs.requirements-file }}

      - name: Install dev tools
        run: pip install ruff pytest pytest-cov

      - name: Lint
        if: inputs.run-lint
        run: ruff check .

      - name: Test
        if: inputs.run-tests
        run: python -m pytest -vv ${{ inputs.test-path }}
